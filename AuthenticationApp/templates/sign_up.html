{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TogetherHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .signup-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative; /* Position relative to contain the absolute positioning of the back button */
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #5a55e0;
            color: white;
            border: none;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .back-btn i {
            margin-right: 8px;
            font-size: 20px;
        }

        .back-btn:hover {
            background-color: #4a45d0;
            transform: translateY(-2px);
        }

        .back-btn:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(90, 85, 224, 0.7);
        }

        .btn-primary {
            background-color: #5a55e0;
            border: none;
        }

        .btn-primary:hover {
            background-color: #4a45d0;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <!-- Back Button inside the form box -->
        <button class="back-btn" onclick="window.history.back();">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <a href="/">
            <img src="{% static 'images/logo.png' %}" alt="TogetherHub" class="mb-3" width="50">
        </a>
        <h2 class="fw-bold">Sign Up</h2>
        <p class="text-muted">Create an account to get started</p>

        <!-- Display messages for errors or success -->
        {% if messages %}
            <div class="alert alert-warning" role="alert">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}

        <!-- Sign Up Form -->
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="firstname" name="firstname" class="form-control" placeholder="First Name" required>
            </div>
            <div class="mb-3">
                <input type="lastname" name="lastname" class="form-control" placeholder="Last Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="mb-3">
                <select name="membership" class="form-control" required>
                    <option selected disabled>Select membership</option>
                    <option value="Basic">Basic</option>
                    <option value="Premium">Premium</option>
                    <option value="Enterprise">Enterprise</option>
                </select>
            </div>
            <div class="mb-3">
                <select name="interest" class="form-control" required>
                    <option selected disabled>Select interest</option>
                    <option value="Technology">Technology</option>
                    <option value="Design">Design</option>
                    <option value="Business">Business</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>

        <p class="mt-3 text-muted">Already have an account? <a href="{% url 'sign_in' %}">Sign In</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
